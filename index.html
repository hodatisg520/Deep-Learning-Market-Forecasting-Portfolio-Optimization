<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Prediction SaaS</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-bg: #ecfdf5;
            --success-text: #059669;
            --error-bg: #fef2f2;
            --error-text: #dc2626;
        }
        body { font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); }
        h1 { text-align: center; margin-top: 0; color: #1e293b; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); }
        .tab { padding: 12px 24px; cursor: pointer; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab:hover { color: var(--primary); }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        button { background-color: var(--primary); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background-color 0.2s; }
        button:hover { background-color: var(--primary-hover); }
        button.secondary { background-color: white; color: var(--primary); border: 1px solid var(--primary); }
        button.secondary:hover { background-color: #eff6ff; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .table-container { overflow-x: auto; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 8px; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; font-variant-numeric: tabular-nums; }
        th, td { padding: 6px 10px; border-bottom: 1px solid var(--border-color); }
        th { background-color: #f1f5f9; font-weight: 600; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; text-align: right; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 0 var(--border-color); }
        td input { width: 70px; padding: 4px; border: 1px solid transparent; border-radius: 4px; text-align: right; font-family: inherit; font-size: 0.9rem; }
        td input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
        tr:hover { background-color: #f8fafc; }
        td:first-child, th:first-child { text-align: center; background-color: #f1f5f9; font-weight: bold; width: 40px; position: sticky; left: 0; z-index: 5; box-shadow: 1px 0 0 var(--border-color); }
        th:first-child { z-index: 15; }

        .result-card { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; border: 1px solid; }
        .result-card.success { background-color: var(--success-bg); border-color: #a7f3d0; }
        .result-card.error { background-color: var(--error-bg); border-color: #fecaca; }
        .tag { padding: 4px 12px; border-radius: 9999px; font-weight: bold; font-size: 0.9rem; display: inline-block; }
        .tag.buy, .tag.sell { background-color: var(--success-text); color: white; }
        .tag.ignore, .tag.hold { background-color: var(--text-muted); color: white; }
        
        .prediction-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .stat-box { background: rgba(255,255,255,0.6); padding: 15px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--text-main); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Stock Prediction SaaS</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">Nhập dữ liệu 20 phiên giao dịch gần nhất để dự đoán tín hiệu giao dịch.</p>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('buy')" id="tab-buy">Buy Signal Model</div>
            <div class="tab" onclick="switchTab('sell')" id="tab-sell">Sell Signal Model</div>
        </div>

        <div class="controls">
            <button class="secondary" onclick="loadSampleData()">Tải dữ liệu mẫu (Sample Data)</button>
            <span style="font-size: 0.9rem; color: var(--text-muted); font-weight: 500;" id="table-info">Mô hình Mua (11 đặc trưng)</span>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead id="dataHead">
                    <!-- Generated via JS -->
                </thead>
                <tbody id="dataBody">
                    <!-- Generated via JS -->
                </tbody>
            </table>
        </div>
        
        <button id="predictBtn" onclick="makePrediction()" style="width: 100%; font-size: 1.1rem; padding: 15px; margin-top: 10px;">Dự Đoán Kết Quả</button>

        <div id="resultBox" class="result-card">
            <h3 style="margin-top: 0; margin-bottom: 15px; color: #1e293b;" id="resultTitle">Kết quả phân tích:</h3>
            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                <span class="stat-label" style="margin-bottom: 0;">Khuyến nghị:</span>
                <span id="resRec" class="tag"></span>
            </div>
            
            <div class="prediction-details">
                <div class="stat-box">
                    <div class="stat-label">Xác suất (Probability)</div>
                    <div class="stat-value" id="resProb">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Độ tin cậy (Confidence)</div>
                    <div class="stat-value" id="resConf">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Ngưỡng (Threshold)</div>
                    <div class="stat-value" id="resThresh" style="font-size: 1.25rem;">--</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Định nghĩa các cột đặc trưng theo đúng API /predict/buy và /predict/sell
    const schemas = {
        buy: [
            "Open", "High", "Low", "Close", "Volume",
            "SMA_14", "RSI_14", "Dist_to_SMA",
            "Log_Return", "priceToEarning", "cashDividendPercentage"
        ],
        sell: [
            "Open", "High", "Low", "Volume",
            "Log_Return", "Volatility_14", "SMA_14", "Dist_to_SMA",
            "RSI_14", "Dist_to_UB", "BB_Percent_B",
            "priceToEarning", "cashDividendPercentage"
        ]
    };

    let currentMode = 'buy';

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('tab-buy').classList.toggle('active', mode === 'buy');
        document.getElementById('tab-sell').classList.toggle('active', mode === 'sell');
        
        document.getElementById('table-info').innerText = mode === 'buy' ? 
            'Mô hình Mua (11 đặc trưng)' : 'Mô hình Bán (13 đặc trưng)';
        
        document.getElementById('resultBox').style.display = 'none';
        
        renderTable();
        loadSampleData();
    }

    function renderTable() {
        const columns = schemas[currentMode];
        const thead = document.getElementById('dataHead');
        const tbody = document.getElementById('dataBody');
        
        // Header
        let headHtml = '<tr><th>Day</th>';
        columns.forEach(col => {
            headHtml += `<th>${col.replace(/_/g, ' ')}</th>`;
        });
        headHtml += '</tr>';
        thead.innerHTML = headHtml;

        // Body (20 rows)
        let bodyHtml = '';
        for (let i = 1; i <= 20; i++) {
            bodyHtml += `<tr><td>${i}</td>`;
            columns.forEach((col, j) => {
                bodyHtml += `<td><input type="number" step="any" id="cell-${i-1}-${j}" value="0"></td>`;
            });
            bodyHtml += '</tr>';
        }
        tbody.innerHTML = bodyHtml;
    }

    function loadSampleData() {
        const columns = schemas[currentMode];
        let baseOpen = 6000;
        
        for (let i = 0; i < 20; i++) {
            baseOpen += (Math.random() - 0.4) * 100; // random walk
            
            for (let j = 0; j < columns.length; j++) {
                const colName = columns[j];
                let val = 0;
                
                if (colName === "Open" || colName === "Close" || colName === "SMA_14" || colName === "High" || colName === "Low") {
                    val = baseOpen + (Math.random() - 0.5) * 50;
                    if(colName === "High") val += 50;
                    if(colName === "Low") val -= 50;
                } else if (colName === "Volume") {
                    val = Math.floor(1000000 + Math.random() * 500000);
                } else if (colName === "RSI_14") {
                    val = 40 + Math.random() * 40;
                } else if (colName === "Log_Return" || colName === "Volatility_14" || colName === "Dist_to_SMA" || colName === "Dist_to_UB") {
                    val = (Math.random() - 0.5) * 0.05;
                } else if (colName === "BB_Percent_B") {
                    val = Math.random();
                } else if (colName === "priceToEarning") {
                    val = 15 + Math.random() * 2;
                } else if (colName === "cashDividendPercentage") {
                    val = 0.05;
                }
                
                // Format với số thập phân hợp lý
                let valStr = val.toFixed(4);
                if (val > 1000) valStr = val.toFixed(1);
                
                document.getElementById(`cell-${i}-${j}`).value = valStr;
            }
        }
    }

    function getTableData() {
        const columns = schemas[currentMode];
        const data = [];
        for (let i = 0; i < 20; i++) {
            const row = [];
            for (let j = 0; j < columns.length; j++) {
                const val = parseFloat(document.getElementById(`cell-${i}-${j}`).value) || 0;
                row.push(val);
            }
            data.push(row);
        }
        return data;
    }

    async function makePrediction() {
        const btn = document.getElementById('predictBtn');
        const resultBox = document.getElementById('resultBox');
        
        // Reset UI
        btn.innerText = "Đang xử lý...";
        btn.disabled = true;
        resultBox.style.display = 'none';
        resultBox.className = 'result-card'; 

        const requestData = { features: getTableData() };
        // Đường dẫn tới API của bạn trên Render
        const API_BASE_URL = 'https://deep-learning-market-forecasting-liyz.onrender.com';
        const endpoint = currentMode === 'buy' ? '/predict/buy' : '/predict/sell';

        try {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });

            const data = await response.json();

            if (response.ok) {
                resultBox.classList.add('success');
                document.getElementById('resProb').innerText = (data.probability * 100).toFixed(2) + '%';
                
                const recSpan = document.getElementById('resRec');
                recSpan.innerText = data.recommendation;
                recSpan.className = `tag ${data.recommendation.toLowerCase()}`;
                
                document.getElementById('resConf').innerText = data.confidence;
                document.getElementById('resThresh').innerText = data.threshold_used;
            } else {
                resultBox.classList.add('error');
                document.getElementById('resProb').innerText = 'Lỗi';
                document.getElementById('resRec').innerText = 'Dữ liệu không hợp lệ';
                document.getElementById('resRec').className = 'tag hold';
                document.getElementById('resConf').innerText = data.detail ? JSON.stringify(data.detail) : 'Unknown error';
                document.getElementById('resThresh').innerText = '--';
            }
            resultBox.style.display = 'block';

        } catch (error) {
            alert(`Lỗi kết nối: ${error.message}\nHãy chắc chắn backend API đang chạy tại port 8000 (uvicorn main:app --reload)`);
        } finally {
            btn.innerText = "Dự Đoán Kết Quả";
            btn.disabled = false;
        }
    }

    // Initialize application
    renderTable();
    loadSampleData();
</script>

</body>
</html>
